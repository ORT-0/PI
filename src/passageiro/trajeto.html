<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EmbarqueAi - Trajeto ao Vivo</title>
  <link rel="stylesheet" href="../assets/css/styles.css">
  <script src="../assets/js/script.js" defer></script>
</head>
<body class="page-trajeto">
  <main class="app">
    <header class="top"><a href="../auth/index.html" aria-label="Ir para início"><img class="logo" src="../assets/imgs/logo-embarqueai.svg" alt="EmbarqueAi"></a></header>
    <a class="logout" href="../auth/index.html">Sair <span>↪</span></a>
    <a class="back" href="grupos.html"><span class="back-icon" aria-hidden="true">&#8249;</span><span>VOLTAR</span></a>
    <section class="stage">
      <div>
        <h1 class="title">Trajeto ao Vivo</h1>
        <div class="line"></div>
        <p class="subtitle">Acompanhe em tempo real</p>
        <section class="panel">
          <div class="map-shell">
            <div class="map" role="img" aria-label="Mapa do trajeto ao vivo">
              <span class="street s1">Praça da<br>República</span><span class="street s2">R. Aurora</span><span class="street s3">Av. São João</span><span class="street s4">Ipiranga</span>
              <span class="route-vertical" aria-hidden="true"></span><span class="direction">↰ Av. Ipiranga</span><span class="marker"><svg viewBox="0 0 64 64"><path d="M32 4 51 58 32 46 13 58z"/></svg></span>
            </div>
          </div>
          <div class="info-title">Informações da Viagem</div>
          <div class="info-list">
            <article class="info-card"><svg viewBox="0 0 24 24"><path d="M12 21s7-6.3 7-12A7 7 0 0 0 5 9c0 5.7 7 12 7 12z"/><circle cx="12" cy="9" r="2.5"/></svg><div><strong>Distância Restante</strong><span>5KM E 520M</span></div></article>
            <article class="info-card"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v6l4 2"/></svg><div><strong>Tempo da Viagem</strong><span>0H E 20 MIN</span></div></article>
          </div>
        </section>
      </div>
    </section>
  </main>
</body>
</html>
