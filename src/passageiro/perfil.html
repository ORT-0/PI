<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>Perfil Passageiro - EmbarqueAi</title>
    <link rel="stylesheet" href="../assets/css/style.css" />
  </head>
  <body>
    <header>
      <div class="logo-white-box">
        <img src="../assets/imgs/logo.png" />
      </div>
      <a href="../auth/login.html" class="btn-sair">Sair</a>
    </header>

    <a
      href="dashboard.html"
      class="btn-back"
      style="position: absolute; left: 20px; top: 100px"
    >
      <img
        src="https://cdn-icons-png.flaticon.com/512/271/271220.png"
        width="30"
      />
    </a>

    <div class="page-title">Meu Perfil</div>

    <main class="card-azul">
      <div class="profile-container">
        <div class="profile-avatar"></div>
        <h2 class="profile-name">Perfil Passageiro/Transportador</h2>
        <span class="profile-role" style="color: orange"
          >Passageiro / Responsável</span
        >
      </div>

      <div class="info-box">
        <span class="label">E-mail</span>
        <span class="value">######@email.com</span>
      </div>

      <div class="info-box">
        <span class="label">Telefone</span>
        <span class="value">(##) #####-####</span>
      </div>

      <button
        class="btn-menu"
        style="
          background: rgba(255, 165, 0, 0.1);
          border: 1px solid orange;
          color: orange;
          margin-top: 20px;
        "
        onclick="abrirModal('modalVinculo')"
      >
        Vincular Passageiro/Responsável
      </button>
    </main>

    <div id="modalVinculo" class="overlay">
      <div class="modal" style="border-top: 5px solid orange">
        <h3 style="color: #1a2a4d">Novo Vínculo</h3>
        <p style="color: #666; font-size: 14px; margin-bottom: 20px">
          Insira o e-mail da pessoa para contato em caso de emergência.
        </p>
        <input
          type="email"
          class="input-field"
          placeholder="email@exemplo.com"
          style="border: 1px solid #ccc; color: #333"
        />

        <button class="btn-action" onclick="fecharModal('modalVinculo')">
          Mandar Pedido
        </button>
        <button
          class="btn-action"
          style="background: #eee; color: #666; margin-top: 10px"
          onclick="fecharModal('modalVinculo')"
        >
          Voltar
        </button>
      </div>
    </div>

    <script src="../assets/js/script.js"></script>
  </body>
</html>
