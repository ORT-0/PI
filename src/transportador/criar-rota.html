<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Embarquei - Criar Rota</title>
  <link rel="stylesheet" href="../assets/css/styles.css">
  <script src="../assets/js/script.js" defer></script>
</head>
<body class="page-criar-rota">
  <main class="app">
    <header class="top"><a href="../auth/index.html" aria-label="Ir para início"><img class="logo" src="../assets/imgs/logo-embarqueai.svg" alt="EmbarqueAi"></a></header>
    <a class="back" href="rotas.html"><span class="back-icon" aria-hidden="true">&#8249;</span><span>VOLTAR</span></a>
    <section class="stage">
      <form action="rotas.html">
        <h1 class="title">Criar Rota</h1>
        <div class="line"></div>
        <section class="card">
          <label for="nome-rota">Nome da Rota</label>
          <input id="nome-rota" name="nome-rota" placeholder="Digite aqui o nome da rota">
          <label for="chegada">Ponto de Chegada</label>
          <input id="chegada" name="chegada" placeholder="Cole o endereço aqui">
        </section>
        <h2 class="block-title">Pontos de Passagem</h2>
        <div class="line"></div>
        <section class="card points">
          <label for="ponto-1">Ponto de Passagem 1</label>
          <input id="ponto-1" name="ponto-1" placeholder="Cole o endereço aqui">
          <label for="ponto-2">Ponto de Passagem 2</label>
          <input id="ponto-2" name="ponto-2" placeholder="Cole o endereço aqui">
          <label for="ponto-3">Ponto de Passagem 3</label>
          <input id="ponto-3" name="ponto-3" placeholder="Cole o endereço aqui">
          <label for="ponto-4">Ponto de Passagem 4</label>
          <input id="ponto-4" name="ponto-4" placeholder="Cole o endereço aqui">
          <button class="button" type="submit">Criar Rota</button>
        </section>
      </form>
    </section>
  </main>
</body>
</html>
