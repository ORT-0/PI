<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>Perfil Transportador - EmbarqueAi</title>
    <link rel="stylesheet" href="../assets/css/style.css" />
  </head>
  <body>
    <header>
      <div class="logo-white-box">
        <img src="../assets/imgs/logo.png" />
      </div>
      <a href="../auth/login.html" class="btn-sair">Sair</a>
    </header>

    <a
      href="dashboard.html"
      class="btn-back"
      style="position: absolute; left: 20px; top: 100px"
    >
      <img
        src="https://cdn-icons-png.flaticon.com/512/271/271220.png"
        width="30"
      />
    </a>

    <div class="page-title">Meu Perfil</div>

    <main class="card-azul">
      <div class="profile-container">
        <div class="profile-avatar"></div>
        <h2 class="profile-name">Perfil Transportador</h2>
        <span class="profile-role" style="color: orange">Transportador</span>
      </div>

      <div class="info-box">
        <span class="label" style="color: orange">E-mail</span>
        <span class="value">##########@email.com</span>
      </div>

      <div class="info-box">
        <span class="label" style="color: orange">Telefone</span>
        <span class="value">(##) ####-####</span>
      </div>

      <a
        href="grupos.html"
        class="btn-menu"
        style="
          margin-top: 20px;
          text-align: center;
          text-decoration: none;
          display: block;
          line-height: 45px; /* Para centralizar o texto verticalmente */
        "
      >
        Ver Meus Grupos
      </a>
    </main>

    <script src="../assets/js/script.js"></script>
  </body>
</html>
