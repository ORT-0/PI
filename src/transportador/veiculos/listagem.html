<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>Meus Veículos - EmbarqueAi</title>
    <link rel="stylesheet" href="../../assets/css/style.css" />
  </head>
  <body>
    <header>
      <div class="logo-white-box">
        <img src="../../assets/imgs/logo.png" />
      </div>
      <a href="../../auth/login.html" class="btn-sair">Sair</a>
    </header>

    <a
      href="../dashboard.html"
      class="btn-back"
      style="position: absolute; left: 20px; top: 100px"
    >
      <img
        src="https://cdn-icons-png.flaticon.com/512/271/271220.png"
        width="30"
      />
    </a>

    <div class="page-title">Veículos</div>

    <main class="card-azul">
      <div
        class="item-card"
        style="background-color: var(--orange-accent); padding: 20px"
      >
        <button class="btn-delete">x</button>

        <div
          class="user-name-tag"
          style="margin: 0 auto 15px; width: fit-content; padding: 5px 30px"
        >
          ########
        </div>

        <div
          class="van-img-container"
          style="
            background: #e0e0e0;
            border: 2px dashed #999;
            height: 150px;
            border-radius: 12px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
          "
        >
          Sem Imagem
        </div>

        <div class="label-orange" style="width: 70%">Placa do Veículo</div>
        <div
          class="input-field"
          style="background: white; color: #333; margin-bottom: 0"
        >
          ###-####
        </div>
      </div>

      <a
        href="registrar.html"
        class="btn-add"
        style="
          text-decoration: none;
          color: black;
          margin-top: 30px;
          display: flex;
          align-items: center;
          justify-content: center;
        "
      >
        +
      </a>
    </main>

    <script src="../../assets/js/script.js"></script>
  </body>
</html>
