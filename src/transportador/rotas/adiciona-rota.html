<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>Adicionar Rota - EmbarqueAi</title>
    <link rel="stylesheet" href="../../assets/css/style.css" />
  </head>
  <body>
    <header>
      <div class="logo-white-box">
        <img src="../../assets/imgs/logo.png" alt="Busafe" />
      </div>
      <a href="../../auth/login.html" class="btn-sair">Sair</a>
    </header>

    <a
      href="javascript:history.back()"
      class="btn-back"
      style="position: absolute; left: 20px; top: 100px"
    >
      <img
        src="https://cdn-icons-png.flaticon.com/512/271/271220.png"
        width="30"
      />
    </a>

    <div class="page-title">Adicionar Rota</div>

    <main class="card-azul">
      <form>
        <div class="label-orange">Nome da Rota</div>
        <input
          type="text"
          class="input-field"
          placeholder="Ex: Rota Manhã - Centro"
        />

        <div class="label-orange">Ponto de Chegada (Destino Final)</div>
        <input
          type="text"
          class="input-field"
          placeholder="Digite o endereço final"
        />

        <div class="label-orange">Pontos de Parada</div>
        <div id="container-paradas">
          <input
            type="text"
            class="input-field"
            placeholder="Endereço da parada 1"
          />
        </div>
        <button
          type="button"
          style="
            background: none;
            border: 1px dashed orange;
            color: orange;
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 10px;
            cursor: pointer;
          "
        >
          + Adicionar Ponto de Parada
        </button>

        <p style="color: black; font-size: 12px; margin-bottom: 20px">
          *Use o google maps para conseguir o endereço desejado
        </p>

        <div class="label-orange">Veículo Designado</div>
        <select class="input-field">
          <option>Van - Teste</option>
          <option>Ônibus - Teste</option>
        </select>

        <button type="button" class="btn-action" onclick="history.back()">
          Salvar Rota
        </button>
      </form>
    </main>
    <script src="../../assets/js/script.js"></script>
  </body>
</html>
