<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>Trajeto ao Vivo - EmbarqueAi</title>
    <link rel="stylesheet" href="../../assets/css/style.css" />
    <style>
      .stats-container {
        display: flex;
        justify-content: space-between;
        margin-bottom: 20px;
        gap: 10px;
      }
      .stat-box {
        background: rgba(255, 255, 255, 0.1);
        flex: 1;
        padding: 15px;
        border-radius: 10px;
        text-align: center;
        border: 1px solid rgba(255, 165, 0, 0.3);
      }
      .stat-value {
        color: orange;
        font-weight: bold;
        font-size: 1.2em;
        display: block;
      }
      .stat-label {
        color: white;
        font-size: 0.8em;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="logo-white-box">
        <img src="../../assets/imgs/logo.png" />
      </div>
      <a href="#" class="btn-sair" onclick="tentarSairDaRota()">Sair</a>
    </header>

    <div class="page-title">Trajeto ao Vivo</div>

    <main class="card-azul">
      <div class="stats-container">
        <div class="stat-box">
          <span class="stat-label">Tempo Decorrido</span>
          <span class="stat-value">00:24:15</span>
        </div>
        <div class="stat-box">
          <span class="stat-label">Distância Restante</span>
          <span class="stat-value">4.2 km</span>
        </div>
      </div>

      <div
        style="
          background: #333;
          height: 180px;
          border-radius: 15px;
          border: 2px solid orange;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          margin-bottom: 20px;
        "
      >
        <div
          style="
            width: 40px;
            height: 40px;
            background: orange;
            border-radius: 50%;
            margin-bottom: 10px;
            animation: pulse 2s infinite;
          "
        ></div>
        <p style="color: white; font-size: 12px; font-weight: bold">
          GPS: RUA DAS FLORES, 123
        </p>
      </div>

      <div class="label-orange">Próximo Ponto de Parada</div>
      <p style="color: white; margin-bottom: 20px">
        Escola Municipal Santa Maria
      </p>

      <button
        class="btn-action"
        style="background: #ff4d4d"
        onclick="abrirModal('modalFinalizar')"
      >
        Finalizar Rota
      </button>
    </main>

    <div id="modalFinalizar" class="overlay">
      <div class="modal">
        <h3 style="color: white">Finalizar Rota?</h3>
        <button class="btn-action" onclick="confirmarFimRota()">
          Sim, Finalizar
        </button>
        <button
          class="btn-action"
          style="background: #ccc; color: #333"
          onclick="fecharModal('modalFinalizar')"
        >
          Cancelar
        </button>
      </div>
    </div>

    <script src="../../assets/js/script.js"></script>
  </body>
</html>
