<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>Detalhes da Rota - EmbarqueAi</title>
    <link rel="stylesheet" href="../../assets/css/style.css" />
  </head>
  <body>
    <header>
      <div class="logo-white-box">
        <img src="../../assets/imgs/logo.png" alt="Busafe" />
      </div>
      <a href="../../auth/login.html" class="btn-sair">Sair</a>
    </header>

    <a
      href="javascript:history.back()"
      class="btn-back"
      style="position: absolute; left: 20px; top: 100px"
    >
      <img
        src="https://cdn-icons-png.flaticon.com/512/271/271220.png"
        width="30"
      />
    </a>

    <div class="page-title">Detalhes da Rota</div>

    <main class="card-azul">
      <div class="label-orange">Nome da Rota</div>
      <p style="color: white; font-weight: bold">Rota Manhã - Escola Central</p>

      <div class="label-orange">Veículo</div>
      <p style="color: white">Van 01 - ABC-1234</p>

      <div class="label-orange">Passageiros Previstos</div>
      <p style="color: white">12 Alunos</p>

      <button class="btn-action" onclick="abrirModal('modalIniciar')">
        Iniciar Rota
      </button>
    </main>

    <div id="modalIniciar" class="overlay">
      <div class="modal">
        <h3 style="color: white">Deseja iniciar esta rota agora?</h3>
        <button class="btn-action" onclick="confirmarInicioRota()">
          Sim, Iniciar
        </button>
        <button
          class="btn-action"
          style="background: #ccc; color: #333"
          onclick="fecharModal('modalIniciar')"
        >
          Cancelar
        </button>
      </div>
    </div>

    <script src="../../assets/js/script.js"></script>
  </body>
</html>
