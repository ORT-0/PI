<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>Minhas Rotas - EmbarqueAi</title>
    <link rel="stylesheet" href="../../assets/css/style.css" />
  </head>
  <body>
    <header>
      <div class="logo-white-box">
        <img src="../../assets/imgs/logo.png" />
      </div>
      <a href="../../auth/login.html" class="btn-sair">Sair</a>
    </header>

    <a
      href="../dashboard.html"
      class="btn-back"
      style="position: absolute; left: 20px; top: 100px"
    >
      <img
        src="https://cdn-icons-png.flaticon.com/512/271/271220.png"
        width="30"
      />
    </a>

    <div class="page-title">Minhas Rotas</div>

    <main class="card-azul">
      <div
        class="item-card"
        style="
          display: flex;
          justify-content: space-between;
          align-items: center;
        "
      >
        <div>
          <div class="label-orange">Rota Manhã</div>
          <p style="color: white; font-size: 12px">Destino: Escola Central</p>
        </div>
        <div style="display: flex; gap: 5px">
          <button
            class="btn-visualizar"
            onclick="window.location.href = 'detalhe-rota.html'"
          >
            Iniciar
          </button>
          <button
            class="btn-visualizar"
            style="background: #555"
            onclick="window.location.href = 'adiciona-rota.html'"
          >
            Editar
          </button>
        </div>
      </div>

      <button
        class="btn-add"
        onclick="window.location.href = 'adiciona-rota.html'"
      >
        +
      </button>
    </main>

    <script src="../../assets/js/script.js"></script>
  </body>
</html>
