<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EmbarqueAi - Login Transportador</title>
  <link rel="stylesheet" href="../assets/css/styles.css">
  <script src="../assets/js/script.js" defer></script>
</head>
<body class="page-transportadora-login">
  <main class="app">
    <header class="top"><a href="index.html" aria-label="Ir para início"><img class="logo" src="../assets/imgs/logo-embarqueai.svg" alt="EmbarqueAi"></a></header>
    <a class="logout" href="index.html">Sair <span>↪</span></a>
    <span class="dots" aria-hidden="true"></span>
    <section class="stage">
      <div>
        <h1 class="title">Login Transportador</h1>
        <div class="line"></div>
        <form class="card" action="../transportador/transportadora-perfil.html">
          <label for="email">E-mail</label>
          <input id="email" name="email" type="email" placeholder="Digite aqui seu e-mail">
          <label for="senha">Senha</label>
          <input id="senha" name="senha" type="password" placeholder="Digite aqui sua senha">
          <a class="forgot" href="esqueceu-senha.html">Esqueceu sua senha?</a>
          <button class="button" type="submit">Login</button>
          <p class="signup">Não tem uma conta?<br><a href="transportadora-cadastro.html">Cadastre-se</a></p>
        </form>
      </div>
    </section>
  </main>
</body>
</html>
