<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recuperar Senha</title>
    <link rel="stylesheet" href="../assets/css/style.css" />
  </head>
  <body>
    <header>
      <div class="logo-white-box">
        <img src="../assets/imgs/logo.png" alt="EmbarqueAi" />
      </div>
    </header>

    <div class="page-title">Recuperar</div>

    <main class="card-azul">
      <p class="helper-text" style="margin-bottom: 20px">
        Enviaremos um link de confirmação para o seu e-mail cadastrado.
      </p>
      <form>
        <div class="label-orange">E-mail</div>
        <input
          type="email"
          class="input-field"
          placeholder="Digite seu e-mail"
        />

        <button type="submit" class="btn-action">Verificar</button>
      </form>
      <p class="helper-text">
        <a href="login.html">Voltar para Login</a>
      </p>
    </main>
    <script src="../assets/js/script.js"></script>
  </body>
</html>
