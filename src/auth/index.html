<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EmbarqueAi - Tela Inicial</title>
  <link rel="stylesheet" href="../assets/css/styles.css">
  <script src="../assets/js/script.js" defer></script>
</head>
<body class="page-index">
  <main class="app">
    <header class="top"><a href="index.html" aria-label="Ir para início"><img class="logo" src="../assets/imgs/logo-embarqueai.svg" alt="EmbarqueAi"></a></header>
    <span class="dots" aria-hidden="true"></span>
    <section class="stage">
      <div class="panel">
        <h1 class="title">Bem Vindo ao EmbarqueAI</h1>
        <div class="line"></div>
        <p class="subtitle">Faça login para acessar sua conta</p>
        <div class="flow">
          <h2 class="flow-title">Sou Transportador</h2>
          <a class="button" href="transportadora-login.html">Login - Transportador</a>
          <p class="signup">Não tem uma conta?<br><a href="transportadora-cadastro.html">Cadastre-se</a></p>
        </div>
        <div class="flow">
          <h2 class="flow-title">Sou Cliente</h2>
          <a class="button" href="cliente-login.html">Login - Cliente</a>
          <p class="signup">Não tem uma conta?<br><a href="cliente-cadastro.html">Cadastre-se</a></p>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
