<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EmbarqueAi - Cadastro</title>
    <link rel="stylesheet" href="../assets/css/style.css" />
  </head>
  <body>
    <header>
      <div class="logo-white-box">
        <img src="../assets/imgs/logo.png" alt="EmbarqueAi" />
      </div>
    </header>

    <a href="login.html" style="position: absolute; left: 20px; top: 100px">
      <img
        src="https://cdn-icons-png.flaticon.com/512/271/271220.png"
        width="30"
      />
    </a>

    <div class="page-title">Cadastro</div>

    <main class="card-azul">
      <form>
        <div class="label-orange">Nome Completo</div>
        <input
          type="text"
          class="input-field"
          placeholder="Digite aqui nome completo"
        />

        <div class="label-orange">E-mail</div>
        <input
          type="email"
          class="input-field"
          placeholder="Digite aqui seu e-mail"
        />

        <div class="label-orange">Telefone</div>
        <input
          type="tel"
          class="input-field"
          placeholder="Digite seu número de telefone"
        />

        <div class="label-orange">Senha</div>
        <input
          type="password"
          class="input-field"
          placeholder="Digite aqui sua senha"
        />

        <div class="label-orange">Confirmar Senha</div>
        <input
          type="password"
          class="input-field"
          placeholder="Confirme aqui sua senha"
        />

        <select id="tipoUsuario" class="input-field select-custom">
          <option value="" disabled selected>Selecione uma opção</option>
          <option value="transportador">Transportador</option>
          <option value="passageiro">Passageiro / Responsável</option>
        </select>

        <button type="button" class="btn-action" onclick="direcionarUsuario()">
          Criar Conta
        </button>

        <script src="../assets/js/script.js"></script>
      </form>
    </main>
  </body>
</html>
