<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Embarquei - Esqueceu a Senha</title>
  <link rel="stylesheet" href="../assets/css/styles.css">
  <script src="../assets/js/script.js" defer></script>
</head>
<body class="page-esqueceu-senha">
  <main class="app">
    <header class="top"><a href="index.html" aria-label="Ir para início"><img class="logo" src="../assets/imgs/logo-embarqueai.svg" alt="EmbarqueAi"></a></header>
    <a class="back" href="cliente-login.html"><span class="back-icon" aria-hidden="true">&#8249;</span><span>VOLTAR</span></a>
    <span class="dots" aria-hidden="true"></span>
    <section class="stage">
      <div>
        <h1 class="title">Verificação por E-mail</h1>
        <div class="line"></div>
        <form class="card" action="cliente-login.html">
          <p class="message">Digite seu e-mail no campo abaixo para receber as instruções de reset de senha</p>
          <div class="form-inner">
            <label for="email">E-mail</label>
            <input id="email" name="email" type="email" placeholder="Digite aqui seu e-mail">
            <button class="button" type="submit">Enviar E-mail</button>
          </div>
        </form>
      </div>
    </section>
  </main>
</body>
</html>
