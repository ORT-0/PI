<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EmbarqueAi - Login</title>
    <link rel="stylesheet" href="../assets/css/style.css" />
  </head>
  <body>
    <header>
      <div class="logo-white-box">
        <img src="../assets/imgs/logo.png" alt="EmbarqueAi" />
      </div>
    </header>

    <div class="page-title">Login</div>

    <main class="card-azul">
      <form>
        <div class="label-orange">E-mail</div>
        <input
          type="email"
          class="input-field"
          placeholder="Digite aqui seu e-mail"
        />

        <div class="label-orange">Senha</div>
        <input
          type="password"
          class="input-field"
          placeholder="Digite aqui sua senha"
        />

        <p class="helper-text" style="text-align: left; margin-left: 10px">
          <a href="recuperar.html">Esqueceu sua Senha?</a>
        </p>

        <button
          type="button"
          class="btn-action"
          onclick="window.location.href = '../transportador/dashboard.html'"
        >
          Entrar
        </button>

        <p class="helper-text">
          Não tem uma conta? <a href="cadastro.html">Cadastre-se!</a>
        </p>
      </form>
    </main>
    <script src="../assets/js/script.js"></script>
  </body>
</html>
